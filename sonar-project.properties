# SonarQube Project Properties
# ================================
# Place this file in the root of each application repository.
# The pipeline overrides sonar.projectKey and sonar.sources via the scanner CLI,
# so this file is optional — but it allows per-project customisation.

# Project identification — must match APP_NAME Jenkins job parameter
# sonar.projectKey=my-application-name
# sonar.projectName=My Application Name

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions — add paths that should never be scanned
# sonar.exclusions=vendor/**,node_modules/**,tests/**,*.min.js

# Test sources — improves analysis accuracy
# sonar.tests=tests
# sonar.test.inclusions=**/*Test.php,**/*Spec.php

# PHP specific
# sonar.php.file.suffixes=php
# sonar.php.coverage.reportPaths=coverage.xml

# .NET specific
# sonar.cs.opencover.reportsPaths=coverage.xml
